services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      engine:
        condition: service_healthy
    restart: always
    networks:
      - frontend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    env_file: ./config/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  nats-leaf:
    build:
      context: ./nats
      dockerfile: Dockerfile
    env_file: ./config/.env
    restart: always
    networks:
      - frontend
      - nats
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    security_opt:
      - no-new-privileges:true

  bridge:
    build:
      context: ./bridge
      dockerfile: Dockerfile
    env_file: ./config/.env
    environment:
      - ENGINE_URL=http://engine:8000
      - NATS_URL=nats://nats-leaf:4222
    depends_on:
      engine:
        condition: service_healthy
      nats-leaf:
        condition: service_started
    restart: always
    networks:
      - frontend
      - nats
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: true

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --loglevel warning
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    security_opt:
      - no-new-privileges:true

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
  nats:
    driver: bridge
    internal: true

volumes:
  redis_data:
    driver: local
