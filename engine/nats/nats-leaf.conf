# SecureLLM NATS Leaf Node Configuration
# Connects outbound to Railway SaaS via WebSocket

server_name: "securellm-onprem"

# Local listen for bridge service
listen: "0.0.0.0:4222"

# Connect to Railway NATS hub via WebSocket
leafnodes {
    remotes [
        {
            url: "wss://SAAS_NATS_URL"
            account: "LEAFNODE_TOKEN"
        }
    ]
}

# Logging
logtime: true
debug: false
trace: false

# Limits
max_payload: 8MB
max_pending: 64MB

# Authorization for local services (bridge connects here)
authorization {
    token: "LOCAL_NATS_TOKEN"
}
